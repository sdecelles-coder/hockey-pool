name: Mise à jour des stats NHL

on:
  schedule:
    - cron: '0 11 * * *'  # 6h00 EST (UTC-5) = 11h00 UTC
  workflow_dispatch:       # Déclenchement manuel depuis l'onglet Actions

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install -r Requirements.txt

      - name: Mettre à jour nhl_stats.json
        run: python update_stats.py
        env:
          VERIFY_SSL: "true"

      - name: Mettre à jour espn_owned.json
        run: python espn_roster.py
        continue-on-error: true   # Ne pas bloquer si les cookies ESPN sont expirés
        env:
          ESPN_LEAGUE_ID: ${{ secrets.ESPN_LEAGUE_ID }}
          ESPN_SEASON:    ${{ secrets.ESPN_SEASON }}
          ESPN_TEAM_ID:   ${{ secrets.ESPN_TEAM_ID }}
          ESPN_SWID:      ${{ secrets.ESPN_SWID }}
          ESPN_S2:        ${{ secrets.ESPN_S2 }}
          VERIFY_SSL:     "true"

      - name: Mettre à jour nhl_contracts.json (PuckPedia)
        run: python update_contracts.py
        continue-on-error: true   # PuckPedia peut bloquer les bots
        env:
          VERIFY_SSL: "true"

      - name: Committer les fichiers mis à jour
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nhl_stats.json espn_owned.json nhl_contracts.json
          git diff --staged --quiet || git commit -m "chore: mise à jour stats NHL [skip ci]"
          git push
