name: Mise à jour quotidienne JSON

on:
  schedule:
    # 5h15 heure de Montréal (EDT été = UTC-4 → 9h15 UTC)
    # En hiver (EST = UTC-5) la tâche tournera à 4h15 AM — acceptable
    - cron: '15 9 * * *'
  workflow_dispatch:  # déclenchement manuel depuis l'onglet Actions

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install -r requirements.txt && pip install playwright && python -m playwright install chromium --with-deps

      - name: Mettre à jour nhl_stats.json
        run: python update_stats.py
        env:
          VERIFY_SSL: "true"

      - name: Mettre à jour espn_owned.json
        run: |
          python -c "
          import os, sys
          missing = [k for k in ['ESPN_LEAGUE_ID','ESPN_SEASON','ESPN_TEAM_ID','ESPN_SWID','ESPN_S2'] if not os.environ.get(k)]
          if missing:
              print('SECRETS MANQUANTS:', missing)
              sys.exit(1)
          print('Tous les secrets ESPN sont presents')
          "
          python espn_roster.py
        continue-on-error: true  # ne bloque pas si les cookies ESPN sont expires
        env:
          ESPN_LEAGUE_ID: ${{ secrets.ESPN_LEAGUE_ID }}
          ESPN_SEASON:    ${{ secrets.ESPN_SEASON }}
          ESPN_TEAM_ID:   ${{ secrets.ESPN_TEAM_ID }}
          ESPN_SWID:      ${{ secrets.ESPN_SWID }}
          ESPN_S2:        ${{ secrets.ESPN_S2 }}
          VERIFY_SSL:     "true"

      - name: Mettre à jour nhl_contracts.json
        run: python update_contracts.py
        continue-on-error: true

      - name: Committer les fichiers mis à jour
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nhl_stats.json espn_owned.json nhl_contracts.json
          git diff --staged --quiet || git commit -m "chore: màj automatique JSON $(date -u +'%Y-%m-%d') [skip ci]"
          git push
